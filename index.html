<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>The Archive</title> 
    <script src="https://cdn.tailwindcss.com"></script> 
    <style>
        .animate-reveal {
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            animation: reveal 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes reveal {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        /* Smooth fade transition between pages */
        .page-section {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .page-section.active {
            display: flex;
            opacity: 1;
        }
        /* Explicitly define the spinning animation for the music note */
        @keyframes slow-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spin-slow {
            animation: slow-spin 4s linear infinite;
        }
        .spin-paused {
            animation-play-state: paused;
        }
    </style>
</head>
<body class="bg-black min-h-screen text-gray-300 font-sans selection:bg-amber-500 selection:text-black">

    <audio id="bg-audio" loop>
        <source src="the ride.mp3" type="audio/mpeg">
    </audio>

    <button id="audio-toggle-btn" onclick="toggleAudio()" class="hidden fixed bottom-6 right-6 w-12 h-12 rounded-full border border-zinc-700 bg-zinc-950 flex items-center justify-center z-50 cursor-pointer hover:border-amber-400 transition-colors shadow-[0_0_15px_rgba(245,158,11,0.1)] group">
        <svg id="music-note" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-amber-500 group-hover:text-amber-400 transition-colors">
            <path fill-rule="evenodd" d="M19.364 5.309a.75.75 0 0 0-.693-.28l-8.5 1.7a.75.75 0 0 0-.604.737v10.155A3.75 3.75 0 0 0 6 17.25c-1.895 0-3.375 1.34-3.375 3S4.105 23.25 6 23.25s3.375-1.34 3.375-3v-8.704l8.25-1.65v6.52A3.75 3.75 0 0 0 14.25 16.5c-1.895 0-3.375 1.34-3.375 3s1.48 3 3.375 3 3.375-1.34 3.375-3V6.375a.75.75 0 0 0-.261-.566Z" clip-rule="evenodd" />
        </svg>
    </button>

    <section id="page-home" class="page-section active min-h-screen flex-col items-center justify-center p-6">
        <div class="max-w-2xl text-center space-y-8 w-full">
            <h1 class="text-4xl md:text-5xl font-light tracking-widest text-white uppercase mb-12">
                The <span class="text-amber-400 font-medium">Archive</span>
            </h1>
            
            <div class="flex flex-col gap-6">
                <button onclick="navigate('page-about')" class="group relative px-8 py-4 border border-zinc-800 hover:border-amber-400 transition-all duration-500 ease-out bg-zinc-950/50 hover:bg-amber-400/10 cursor-pointer">
                    <span class="text-lg tracking-wide group-hover:text-amber-400 transition-colors duration-300">
                        What's this about?
                    </span>
                </button>
            </div>
        </div>
    </section>

    <section id="page-about" class="page-section min-h-screen items-center justify-center overflow-hidden text-center p-6">
        <div id="about-content">
            <p class="text-amber-400 tracking-[0.3em] uppercase text-sm mb-4">Chapter I</p>
            <h2 class="text-3xl md:text-5xl font-light text-white leading-relaxed max-w-3xl">
                Uthi ndiyakubhida so I'll be very clear, <br>
                Ubuhle bakho bundiphandlile. <br>
                You're on guard but I'm willing to be patient and unravel the tangles of your heart. <br>
                This is a glimpse of the depth of my love, <br>
                Ndiphe ithuba ndikubonise ubunzulu bothando lwam. <br>
                <span class="text-amber-500 italic font-serif">Be my woman.</span>
            </h2>
            <div class="mt-12">
                <button onclick="navigate('page-home')" class="text-zinc-500 hover:text-amber-400 transition-colors text-sm uppercase tracking-widest border-b border-transparent hover:border-amber-400 pb-1 cursor-pointer">Return</button>
            </div>
        </div>
    </section>

    <script>

        // Play the joint
        const audio = document.getElementById('bg-audio');
        const audioBtn = document.getElementById('audio-toggle-btn');
        const musicNote = document.getElementById('music-note');
        let audioStarted = false;

        function navigate(targetPageId) {
            // 1. Handle Audio 
            if (!audioStarted && targetPageId === 'page-about') {
                audio.play().then(() => {
                    audioStarted = true;
                    // Reveal the button
                    audioBtn.classList.remove('hidden');
                    // Spin the NOTE, not the button
                    musicNote.classList.add('spin-slow');
                }).catch(e => console.log("Audio play failed:", e));
            }

            // 2. Hide all sections
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(section => {
                section.classList.remove('active');
                setTimeout(() => {
                    if (!section.classList.contains('active')) {
                        section.style.display = 'none';
                    }
                }, 50); 
            });

            // 3. Show target section
            const target = document.getElementById(targetPageId);
            target.style.display = targetPageId === 'page-home' || targetPageId === 'page-about' ? 'flex' : 'block';
            
            void target.offsetWidth; 
            target.classList.add('active');

            // 4. Re-trigger the CSS animation for the About page text
            if (targetPageId === 'page-about') {
                const aboutContent = document.getElementById('about-content');
                aboutContent.classList.remove('animate-reveal');
                void aboutContent.offsetWidth; 
                aboutContent.classList.add('animate-reveal');
            }
        }

        // 5. Toggle play/pause and the spinning animation
        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                musicNote.classList.remove('spin-paused');
                audioBtn.style.opacity = '1';
            } else {
                audio.pause();
                musicNote.classList.add('spin-paused');
                audioBtn.style.opacity = '0.5'; 
            }
        }
    </script>
</body>
</html>
